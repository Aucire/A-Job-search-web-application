<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>job/seeking/web-application</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merienda:wght@300..900&family=Protest+Revolution&display=swap');
        body{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-align: center;
        }
        h1{
            font-family: "Protest Revolution", sans-serif;
            color: white;
        }
        #data, h2, input,button{
            font-family: "Merienda", cursive;
        }
    </style>
</head>
<body class="bg-sky-800/60">
    <nav></nav>
    <main class="transition delay-150 duration-300 ease-in-out">
        <header><h1 class="m-10 text-5xl font-extrabold">THIS IS A JOB-SEARCHING WEBPAGE APPLICATION</h1></header>
        <section class="w-250 h-20 mx-auto my-10 bg-sky-800/45 rounded-2xl shadow shadow-lg shadow-black py-auto">
            <!-- SEARCH-BAR AND BUTTON -->
            <form action="search" class="">
                <input type="text" placeholder="search for job vacancies" id="search" class="hover:scale-105 cursor-pointer text-3xl font-bold mt-5 outline-0 w-100 text-white ">
                <button id="btn" class="text-xl border border-3 border-gray-200 cursor-pointer text-white rounded-xl hover:bg-white hover:text-black hover:scale-120 font-bold px-3 py-1 transition delay-150 duration-300 ease-in-out">search</button>
            </form>
        </section>
        <!-- DIVISION TO DISPLAY DATA FROM THE SERVER -->
        <section class="mx-auto w-250 py-10 bg-sky-800/45 min-h-screen h-auto rounded-2xl shadow shadow-xl shadow-black">
            <!-- ELEMENT TO HOLD THE ERRORS -->
            <div id="ERRORS"></div>
            <!-- TOPIC -->
            <h2 class="text-4xl font-extrabold mb-10">BELOW ARE THE AVAILABLE VACANCIES</h2>
            <div id="data"></div>
        </section>
    </main>

    <!-- JAVASCRIPT FILE LINK -->
    <script src="/job.js"></script>
    <footer></footer>
</body>
</html>
